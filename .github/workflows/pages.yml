name: Update surfdata and deploy Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: "12 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Actuele surfdata ophalen
        run: node scripts/fetch-data.mjs data/latest.json

      - name: Website samenstellen
        run: |
          mkdir -p _site/data
          cp index.html styles.css app.js _site/
          cp data/latest.json _site/data/
          touch _site/.nojekyll

      - name: GitHub Pages instellen
        uses: actions/configure-pages@v5

      - name: Website uploaden
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publiceren
        id: deployment
        uses: actions/deploy-pages@v4
