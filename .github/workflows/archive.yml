name: Extend long-term wave archive

on:
  schedule:
    - cron: "47 4 * * 0"
  workflow_dispatch:
    inputs:
      years_per_buoy:
        description: "Aantal jaren per boei in deze run"
        required: true
        default: "2"

permissions:
  contents: write

concurrency:
  group: archive-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Archief uitbreiden
        env:
          ARCHIVE_YEARS_PER_RUN: ${{ inputs.years_per_buoy || '2' }}
        run: node scripts/backfill-history.mjs data/archive.json

      - name: Archief bewaren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/archive.json
          if git diff --cached --quiet; then
            echo "Archief is al compleet"
          else
            git commit -m "Extend long-term wave archive"
            git push origin main
          fi
