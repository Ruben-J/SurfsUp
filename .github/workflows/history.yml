name: Update 30-day history

on:
  schedule:
    - cron: "27 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: history-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Historie ophalen
        run: node scripts/fetch-history.mjs data/history.json

      - name: Nieuwe historie bewaren
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          if git diff --cached --quiet; then
            echo "Geen nieuwe historie"
          else
            git commit -m "Update 30-day surf history"
            git push origin main
          fi
